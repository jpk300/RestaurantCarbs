<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant Carbs Finder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="badge">Restaurant Nutrition Lookup</p>
        <h1>Restaurant Carbs Finder</h1>
        <p>Compare carbs, fat, and calories quickly across published restaurant menu items.</p>
      </header>

      <section class="card">
        <label for="restaurantDropdown">Choose a restaurant</label>
        <div id="restaurantDropdown" class="modern-dropdown" aria-label="Choose a restaurant"></div>
      </section>

      <section class="card">
        <label for="categoryDropdown">Choose a food category</label>
        <div id="categoryDropdown" class="modern-dropdown" aria-label="Choose a food category"></div>
      </section>

      <section class="card">
        <label for="itemDropdown">Choose a menu item</label>
        <div id="itemDropdown" class="modern-dropdown" aria-label="Choose a menu item"></div>
      </section>

      <section class="card nutrition" aria-live="polite">
        <h2>Nutrition Facts</h2>
        <p class="placeholder">Select a restaurant, category, and item to view nutrition details.</p>
        <dl class="nutrition-grid hidden" id="nutritionGrid">
          <div><dt>Carbs</dt><dd id="carbsValue">—</dd></div>
          <div><dt>Fat</dt><dd id="fatValue">—</dd></div>
          <div><dt>Calories</dt><dd id="caloriesValue">—</dd></div>
        </dl>
        <p class="status" id="userStatus"></p>
      </section>

      <p class="subtle-link"><a href="admin.html">Data source settings</a></p>
    </main>

    <script src="app.js"></script>
    <script src="user.js"></script>
  </body>
</html>
